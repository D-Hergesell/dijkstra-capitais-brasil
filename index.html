<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★ CAMINHO MAIS BARATO ★ Capitais do Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- ===== TELA INICIAL (START) ===== -->
  <div id="startScreen" class="start">
    <div class="start-stars"></div>
    <div class="start-sun"></div>
    <div class="start-mountains"></div>
    <div class="start-skyline"></div>
    <div class="start-content">
      <h1 class="start-title">CAMINHO<br>MAIS&nbsp;BARATO</h1>
      <p class="start-sub">★ CAPITAIS DO BRASIL ★</p>
      <button id="startBtn" class="start-btn blink">▶ PRESS START ◀</button>
      <p class="start-tip">insira a ficha e acelere!</p>
    </div>
    <div class="start-road">
      <!-- carro que cruza a tela ao apertar start -->
      <div class="car start-car" id="startCar"></div>
    </div>
  </div>

  <!-- ===== MENU (revelado após o start) ===== -->
  <main id="app" class="app-hidden">
    <h1>CAMINHO MAIS BARATO</h1>
    <p class="sub blink">▶ CAPITAIS DO BRASIL ◀</p>

    <!-- BUSCA -->
    <section class="window">
      <header class="titlebar"><span>ROTA.EXE</span><span class="dots"><span class="r"></span><span class="y"></span><span class="g"></span></span></header>
      <div class="body">
        <div class="grid">
          <label>◆ ORIGEM
            <input id="origem" list="caps" placeholder="Selecione a capital...">
          </label>
          <label>◆ DESTINO
            <input id="destino" list="caps" placeholder="Selecione a capital...">
          </label>
          <label>⛽ COMBUSTÍVEL R$/L
            <input id="fuel" type="number" step="0.01" min="0" value="5.89">
          </label>
          <label>🚗 AUTONOMIA km/L
            <input id="auton" type="number" step="0.1" min="0.1" value="12">
          </label>
        </div>
        <datalist id="caps"></datalist>
        <button id="go" type="button">► CALCULAR ROTA ◄</button>
      </div>
    </section>

    <!-- RESULTADO -->
    <section class="window" id="resWin" hidden>
      <header class="titlebar"><span>RESULTADO.LOG</span><span class="dots"><span class="r"></span><span class="y"></span><span class="g"></span></span></header>
      <div class="body"><output id="result" class="result"></output></div>
    </section>

    <!-- GRAFO -->
    <section class="window">
      <header class="titlebar"><span>GRAFO.DAT</span><span class="dots"><span class="r"></span><span class="y"></span><span class="g"></span></span></header>
      <div class="body">
        <details>
          <summary> Mostrar vértices e adjacências (Show)</summary>
          <div id="show" style="margin-top:10px"></div>
        </details>
      </div>
    </section>
  </main>

  <!-- ===== Overlay CRT (scanlines + vinheta) ===== -->
  <div class="crt" aria-hidden="true"></div>

  <!-- ===== Botão de som (chiptune via Web Audio) ===== -->
  <button id="sndBtn" class="snd-btn" type="button" aria-label="ligar/desligar som">♪ ON</button>

  <!-- ===== Botão de voltar à tela inicial (aparece só no menu) ===== -->
  <button id="backBtn" class="back-btn" type="button" aria-label="voltar à tela inicial">◀ INÍCIO</button>

<script type="module" src="script/ui/app.js"></script>
</body>
</html>
